<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Interactive Styling Room | Comf i Virtual Wardrobe</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="index.html" style="text-decoration: none; color: inherit"
          >Comf i</a
        >
      </div>
      <nav aria-label="Main Navigation">
        <a href="wardrobe.html" aria-current="page">Wardrobe</a>
        <a href="wardrobe.html">Outfits</a>
        <a href="wardrobe.html">Favourites</a>
      </nav>
    </header>

    <main class="main-layout">
      <aside class="sidebar" aria-label="Wardrobe Filters">
        <h2>Filter items to match your day</h2>

        <fieldset class="filter-group">
          <legend>Category</legend>
          <label
            ><input type="checkbox" class="category" value="Tops" /> Tops</label
          >
          <label
            ><input type="checkbox" class="category" value="Bottoms" />
            Bottoms</label
          >
          <label
            ><input type="checkbox" class="category" value="One piece" /> One
            piece</label
          >
          <label
            ><input type="checkbox" class="category" value="Outerwear" />
            Outerwear</label
          >
        </fieldset>

        <fieldset class="filter-group">
          <legend>Weather</legend>
          <label
            ><input type="checkbox" class="weather" value="Warm" /> Warm</label
          >
          <label
            ><input type="checkbox" class="weather" value="Cold" /> Cold</label
          >
          <label
            ><input type="checkbox" class="weather" value="Rainy" />
            Rainy</label
          >
        </fieldset>
      </aside>

      <section class="builder" aria-label="Available Wardrobe Items Selection">
        <h3 class="title">Click items to add to your outfit</h3>

        <div class="rows" id="items-container">
          <button type="button" class="item" aria-label="Select Jumpsuit">
            <img
              src="images/Resized/Jumpswit-removebg-preview.png"
              alt="Modern One-Piece Jumpsuit"
            />
          </button>

          <button type="button" class="item" aria-label="Select Silk Blouse">
            <img
              src="images/Resized/blouse-removebg-preview.png"
              alt="Elegant Silk Blouse"
            />
          </button>

          <button
            type="button"
            class="item"
            aria-label="Select Blue Denim Jeans"
          >
            <img
              src="images/Resized/bottjeans1-removebg-preview.png"
              alt="Classic Blue Denim Jeans"
            />
          </button>

          <button type="button" class="item" aria-label="Select Evening Dress">
            <img
              src="images/Resized/dressserious-removebg-preview.png"
              alt="Elegant Formal Evening Dress"
            />
          </button>

          <button type="button" class="item" aria-label="Select Winter Coat">
            <img
              src="images/Resized/coatwinter-removebg-preview.png"
              alt="Heavy Long Winter Coat"
            />
          </button>

          <button type="button" class="item" aria-label="Select Handbag">
            <img
              src="images/Resized/Bag-removebg-preview.png"
              alt="Leather Shoulder Handbag"
            />
          </button>

          <button type="button" class="item" aria-label="Select Casual T-Shirt">
            <img
              src="images/Resized/tshirt2-removebg-preview.png"
              alt="Casual Cotton T-Shirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Leather Jacket">
            <img
              src="images/Resized/jacketleather-removebg-preview.png"
              alt="Black Classic Leather Jacket"
            />
          </button>

          <button
            type="button"
            class="item"
            aria-label="Select Sport Long-Sleeve"
          >
            <img
              src="images/Resized/longsleevesport-removebg-preview.png"
              alt="Athletic Long-Sleeve Shirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Comfy Hoodie">
            <img
              src="images/Resized/Hoodie-removebg-preview.png"
              alt="Comfortable Oversized Hoodie"
            />
          </button>

          <button type="button" class="item" aria-label="Select Jean Jacket">
            <img
              src="images/Resized/jacketjeans-removebg-preview.png"
              alt="Blue Denim Jean Jacket"
            />
          </button>

          <button type="button" class="item" aria-label="Select Jean Shorts">
            <img
              src="images/Resized/shortj-removebg-preview.png"
              alt="Casual Denim Shorts"
            />
          </button>

          <button type="button" class="item" aria-label="Select Sweatpants">
            <img
              src="images/Resized/botttuta1-removebg-preview.png"
              alt="Comfy Fleece Sweatpants"
            />
          </button>

          <button type="button" class="item" aria-label="Select Raincoat">
            <img
              src="images/Resized/coatrain-removebg-preview.png"
              alt="Waterproof Yellow Raincoat"
            />
          </button>

          <button type="button" class="item" aria-label="Select Heart Handbag">
            <img
              src="images/Resized/bagheart-removebg-preview.png"
              alt="Heart Patterned Handbag"
            />
          </button>

          <button type="button" class="item" aria-label="Select Black Shoes">
            <img
              src="images/Resized/shoesblack-removebg-preview.png"
              alt="Formal Black Leather Shoes"
            />
          </button>

          <button type="button" class="item" aria-label="Select Knit Sweater">
            <img
              src="images/Resized/Sweater-removebg-preview.png"
              alt="Cozy Knit Sweater"
            />
          </button>

          <button type="button" class="item" aria-label="Select A-Line Skirt">
            <img
              src="images/Resized/skirt-removebg-preview.png"
              alt="Casual A-Line Skirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Zip-Up Hoodie">
            <img
              src="images/Resized/hoodieopen-removebg-preview.png"
              alt="Zip-Up Sporty Hoodie"
            />
          </button>

          <button type="button" class="item" aria-label="Select Blazer">
            <img
              src="images/Resized/Jacketserious1-removebg-preview.png"
              alt="Tailored Formal Blazer Jacket"
            />
          </button>

          <button type="button" class="item" aria-label="Select Sandals">
            <img
              src="images/Resized/shoessandale-removebg-preview.png"
              alt="Open-Toed Summer Sandals"
            />
          </button>

          <button type="button" class="item" aria-label="Select Summer Dress">
            <img
              src="images/Resized/dressopen-removebg-preview.png"
              alt="Casual Flowing Summer Dress"
            />
          </button>

          <button type="button" class="item" aria-label="Select Smart Trousers">
            <img
              src="images/Resized/botttutaser-removebg-preview.png"
              alt="Tailored Smart Casual Trousers"
            />
          </button>

          <button type="button" class="item" aria-label="Select Blue Skirt">
            <img
              src="images/Resized/skirtblue-removebg-preview.png"
              alt="Blue Pleated Skirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Trench Coat">
            <img
              src="images/Resized/coatsoft-removebg-preview.png"
              alt="Soft Pastel Trench Coat"
            />
          </button>

          <button type="button" class="item" aria-label="Select Knit Sweater">
            <img
              src="images/Resized/sweaterknit-removebg-preview.png"
              alt="Warm Cozy Knit Sweater"
            />
          </button>

          <button type="button" class="item" aria-label="Select Band T-Shirt">
            <img
              src="images/Resized/Tshirtmusic-removebg-preview.png"
              alt="Graphic Music Band T-Shirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Sport T-Shirt">
            <img
              src="images/Resized/Tshirtf1-removebg-preview.png"
              alt="Athletic Fit Sporty T-Shirt"
            />
          </button>

          <button
            type="button"
            class="item"
            aria-label="Select Running Sneakers"
          >
            <img
              src="images/Resized/shoestaka-removebg-preview.png"
              alt="Casual Streetwear Running Sneakers"
            />
          </button>

          <button type="button" class="item" aria-label="Select White Jeans">
            <img
              src="images/Resized/bottWhiteJeans-removebg-preview.png"
              alt="Slim-Fit White Denim Jeans"
            />
          </button>

          <button
            type="button"
            class="item"
            aria-label="Select Long Sleeve Button-Up"
          >
            <img
              src="images/Resized/logsleeveopen-removebg-preview.png"
              alt="Button-Up Long Sleeve Shirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Linen Blouse">
            <img
              src="images/Resized/LinenBlousef1-removebg-preview.png"
              alt="Lightweight Summer Linen Blouse"
            />
          </button>

          <button type="button" class="item" aria-label="Select Winter Dress">
            <img
              src="images/Resized/dresswinter-removebg-preview.png"
              alt="Long Sleeve Knit Winter Dress"
            />
          </button>

          <button
            type="button"
            class="item"
            aria-label="Select Long Sleeve Shirt"
          >
            <img
              src="images/Resized/longsleevecasual-removebg-preview.png"
              alt="Casual Long Sleeve Top"
            />
          </button>

          <button type="button" class="item" aria-label="Select White Shirt">
            <img
              src="images/Resized/shirtwhite-removebg-preview.png"
              alt="Classic White Shirt"
            />
          </button>

          <button type="button" class="item" aria-label="Select Formal Shorts">
            <img
              src="images/Resized/shortsearious-removebg-preview.png"
              alt="Tailored Formal Shorts"
            />
          </button>
        </div>

        <div class="g2-move-Btns">
          <button id="g2-prevBtn" aria-label="Previous Items Page">&lt;</button>
          <button id="g2-nextBtn" aria-label="Next Items Page">&gt;</button>
        </div>
      </section>

      <aside class="preview" aria-label="Mannequin Outfit Preview">
        <div class="model-wrapper">
          <img
            id="layer-Bottoms"
            class="clothes-layer"
            src=""
            alt="Selected Bottom Layer"
          />
          <img
            id="layer-Tops"
            class="clothes-layer"
            src=""
            alt="Selected Top Layer"
          />
          <img
            id="layer-One-piece"
            class="clothes-layer"
            src=""
            alt="Selected One-Piece Dress Layer"
          />
          <img
            id="layer-Outerwear"
            class="clothes-layer"
            src=""
            alt="Selected Outerwear Jacket Layer"
          />
        </div>
        <div class="btn-group">
          <button id="reset-outfit" class="btn-secondary">Reset Outfit</button>
        </div>
      </aside>
    </main>

    <script src="script3.js"></script>

    <footer>
      <p>©2026 Comf i</p>
      <a href="#" class="foot" aria-label="Learn more about Comf i">About</a>
      <a href="#" class="foot" aria-label="Get in touch with Comf i support"
        >Contact</a
      >
    </footer>
  </body>
</html>
